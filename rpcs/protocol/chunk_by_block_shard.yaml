openapi: 3.1.0
info:
  title: "NEAR Protocol RPC: Chunk by Block ID and Shard ID"
  description: Retrieve chunk data using block ID and shard ID coordinates
  version: 1.0.0
servers:
  - url: "https://rpc.mainnet.fastnear.com"
    description: Mainnet
  - url: "https://rpc.testnet.fastnear.com"
    description: Testnet
paths:
  /:
    post:
      operationId: chunk_by_block_shard
      summary: Get chunk by block ID and shard ID
      description: Retrieves chunk details using block ID and shard ID coordinates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jsonrpc, id, method, params]
              properties:
                jsonrpc:
                  type: string
                  enum: ["2.0"]
                id:
                  type: string
                  example: fastnear
                method:
                  type: string
                  enum: [chunk]
                params:
                  type: object
                  required: [block_id, shard_id]
                  properties:
                    block_id:
                      oneOf:
                        - type: integer
                          description: Block height
                        - type: string
                          description: Base58-encoded block hash
                      description: Block height (integer) or block hash (string)
                    shard_id:
                      type: integer
                      description: Shard identifier
            examples:
              mainnet:
                summary: Mainnet Block/Shard Example
                value:
                  jsonrpc: "2.0"
                  id: fastnear
                  method: chunk
                  params:
                    block_id: BnHU4MCqsNVgLRCiZteef85VYxCbNzwkWEo1cEG8Z6VX
                    shard_id: 0
              testnet:
                summary: Testnet Block/Shard Example
                value:
                  jsonrpc: "2.0"
                  id: fastnear
                  method: chunk
                  params:
                    block_id: G92i6jYNUcJ6nZpPPF6TUghBoYbewqBQeUNquF3Qz38i
                    shard_id: 0
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
components:
  schemas:
    JsonRpcResponse:
      type: object
      required: [jsonrpc, id]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: number
        result:
          type: object
          properties:
            author:
              type: string
              description: NEAR account ID
            header:
              type: object
              description: Contains main info about the chunk.
              properties:
                balance_burnt:
                  type: string
                  description: Amount in yoctoNEAR
                bandwidth_requests:
                  type: [object, "null"]
                  description: One of multiple possible types
                chunk_hash:
                  type: string
                  description: Base58-encoded hash
                congestion_info:
                  type: [object, "null"]
                  description: "Stores the congestion level of a shard. More info about congestion [here](https://near.github.io/nearcore/architecture/how/receipt-congestion.html?highlight=congestion#receipt-congestion)"
                encoded_length:
                  type: integer
                  format: uint64
                  minimum: 0
                encoded_merkle_root:
                  type: string
                  description: Base58-encoded hash
                gas_limit:
                  type: string
                  description: Gas amount
                gas_used:
                  type: string
                  description: Gas amount
                height_created:
                  type: integer
                  format: uint64
                  minimum: 0
                height_included:
                  type: integer
                  format: uint64
                  minimum: 0
                outcome_root:
                  type: string
                  description: Base58-encoded hash
                outgoing_receipts_root:
                  type: string
                  description: Base58-encoded hash
                prev_block_hash:
                  type: string
                  description: Base58-encoded hash
                prev_state_root:
                  type: string
                  description: Base58-encoded hash
                rent_paid:
                  type: string
                  description: Amount in yoctoNEAR
                  default: "0"
                shard_id:
                  type: integer
                  description: Shard identifier
                signature:
                  type: string
                  description: Base58-encoded cryptographic signature
                tx_root:
                  type: string
                  description: Base58-encoded hash
                validator_proposals:
                  type: array
                  items:
                    type: object
                validator_reward:
                  type: string
                  description: Amount in yoctoNEAR
                  default: "0"
              required:
                - chunk_hash
                - prev_block_hash
                - outcome_root
                - prev_state_root
                - encoded_merkle_root
                - encoded_length
                - height_created
                - height_included
                - shard_id
                - gas_used
                - gas_limit
                - balance_burnt
                - outgoing_receipts_root
                - tx_root
                - validator_proposals
                - signature
            receipts:
              type: array
              items:
                type: object
            transactions:
              type: array
              items:
                type: object
          required: [author, header, transactions, receipts]
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
            data:
              type: object
