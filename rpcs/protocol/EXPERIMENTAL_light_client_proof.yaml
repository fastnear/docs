openapi: 3.1.0
info:
  title: "NEAR Protocol RPC: Get light client execution proof"
  description: Returns the proofs for a transaction execution
  version: 1.0.0
servers:
  - url: "https://rpc.mainnet.fastnear.com"
    description: Mainnet
  - url: "https://rpc.testnet.fastnear.com"
    description: Testnet
paths:
  /:
    post:
      operationId: EXPERIMENTAL_light_client_proof
      summary: Get light client execution proof
      description: Returns the proofs for a transaction execution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jsonrpc, id, method, params]
              properties:
                jsonrpc:
                  type: string
                  enum: ["2.0"]
                id:
                  type: string
                  example: fastnear
                method:
                  type: string
                  enum: [EXPERIMENTAL_light_client_proof]
                params:
                  type: object
                  properties:
                    light_client_head:
                      type: string
                      description: Base58-encoded hash
                    sender_id:
                      type: string
                      description: NEAR account ID
                    transaction_hash:
                      type: string
                      description: Base58-encoded hash
                    type:
                      type: string
                      enum: [receipt]
                    receipt_id:
                      type: string
                      description: Base58-encoded hash
                    receiver_id:
                      type: string
                      description: NEAR account ID
                  required: [light_client_head]
            examples:
              mainnet:
                summary: Get light client execution proof (Mainnet)
                value:
                  jsonrpc: "2.0"
                  id: fastnear
                  method: EXPERIMENTAL_light_client_proof
                  params:
                    light_client_head: BnHU4MCqsNVgLRCiZteef85VYxCbNzwkWEo1cEG8Z6VX
                    sender_id: 0-relay.hot.tg
                    transaction_hash: 8a8HR2Gf8NkLLeNcuHet4JeEz9kWa1fhs6qAnBdiewrR
                    type: receipt
                    receipt_id: Fdt2JqfAh8s1xNC32wyYjjH2QrPmHJYRrbv4ytyt3ra4
                    receiver_id: 0-relay.hot.tg
              testnet:
                summary: Get light client execution proof (Testnet)
                value:
                  jsonrpc: "2.0"
                  id: fastnear
                  method: EXPERIMENTAL_light_client_proof
                  params:
                    light_client_head: G92i6jYNUcJ6nZpPPF6TUghBoYbewqBQeUNquF3Qz38i
                    sender_id: relay.aurora
                    transaction_hash: Ac5D9MWqo5wKmRBZiqQfyuJfz4SMsgc3tDCjMoQBBeRK
                    type: receipt
                    receipt_id: J4zDz1wsdqYqHHn2QkTNnMq1Pr9LKY7v5rspPi3Xehz9
                    receiver_id: relay.aurora
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
components:
  schemas:
    JsonRpcResponse:
      type: object
      required: [jsonrpc, id]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: number
        result:
          type: object
          properties:
            block_header_lite:
              type: object
              properties:
                inner_lite:
                  type: object
                  description: "A part of a state for the current head of a light client. More info [here](https://nomicon.io/ChainSpec/LightClient)."
                inner_rest_hash:
                  type: string
                  description: Base58-encoded hash
                prev_block_hash:
                  type: string
                  description: Base58-encoded hash
              required: [prev_block_hash, inner_rest_hash, inner_lite]
            block_proof:
              type: array
              items:
                type: object
            outcome_proof:
              type: object
              properties:
                block_hash:
                  type: string
                  description: Base58-encoded hash
                id:
                  type: string
                  description: Base58-encoded hash
                outcome:
                  type: object
                proof:
                  type: array
                  items:
                    type: object
              required: [proof, block_hash, id, outcome]
            outcome_root_proof:
              type: array
              items:
                type: object
          required: [outcome_proof, outcome_root_proof, block_header_lite, block_proof]
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
            data:
              type: object
