openapi: 3.1.0
info:
  title: "NEAR Protocol RPC: View global contract code"
  description: Returns a globally deployed contract code by its code hash
  version: 1.0.0
servers:
  - url: "https://rpc.mainnet.fastnear.com"
    description: Mainnet
  - url: "https://rpc.testnet.fastnear.com"
    description: Testnet
paths:
  /:
    post:
      operationId: view_global_contract_code
      summary: View global contract code
      description: Returns a globally deployed contract code by its code hash
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jsonrpc, id, method, params]
              properties:
                jsonrpc:
                  type: string
                  enum: ["2.0"]
                id:
                  type: string
                  example: fastnear
                method:
                  type: string
                  enum: [query]
                params:
                  type: object
                  properties:
                    code_hash:
                      type: string
                      description: Base58-encoded hash
                    request_type:
                      type: string
                      enum: [view_global_contract_code]
                    finality:
                      type: string
                      enum: [final, optimistic]
                      description: Block finality
                  required: [request_type, code_hash, finality]
            examples:
              mainnet:
                summary: View global contract code (Mainnet)
                value:
                  jsonrpc: "2.0"
                  id: fastnear
                  method: query
                  params:
                    code_hash: ExampleCodeHash
                    request_type: view_global_contract_code
                    finality: final
              testnet:
                summary: View global contract code (Testnet)
                value:
                  jsonrpc: "2.0"
                  id: fastnear
                  method: query
                  params:
                    code_hash: ExampleCodeHash
                    request_type: view_global_contract_code
                    finality: final
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
components:
  schemas:
    JsonRpcResponse:
      type: object
      required: [jsonrpc, id]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: number
        result:
          type: object
          description: A view of the contract code.
          properties:
            code_base64:
              type: string
            hash:
              type: string
              description: Base58-encoded hash
          required: [code_base64, hash]
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
            data:
              type: object
