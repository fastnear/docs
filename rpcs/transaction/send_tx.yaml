openapi: 3.1.0
info:
  title: "NEAR Protocol RPC: Send transaction"
  description: Sends transaction and returns the guaranteed execution status and results
  version: 1.0.0
servers:
  - url: "https://rpc.mainnet.fastnear.com"
    description: Mainnet
  - url: "https://rpc.testnet.fastnear.com"
    description: Testnet
paths:
  /:
    post:
      operationId: send_tx
      summary: Send transaction
      description: Sends transaction and returns the guaranteed execution status and results
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jsonrpc, id, method, params]
              properties:
                jsonrpc:
                  type: string
                  enum: ["2.0"]
                id:
                  type: string
                  example: fastnear
                method:
                  type: string
                  enum: [send_tx]
                params:
                  type: object
                  properties:
                    signed_tx_base64:
                      type: string
                      description: Base64-encoded signed transaction
                    wait_until:
                      type: string
                      enum:
                        - NONE
                        - INCLUDED
                        - INCLUDED_FINAL
                        - EXECUTED
                        - EXECUTED_OPTIMISTIC
                        - FINAL
                      description: Desired level of execution status guarantee
                      default: EXECUTED_OPTIMISTIC
                  required: [signed_tx_base64]
            examples:
              mainnet:
                summary: Send transaction (Mainnet)
                value:
                  jsonrpc: "2.0"
                  id: fastnear
                  method: send_tx
                  params:
                    signed_tx_base64: ExampleBase64EncodedTransaction
                    wait_until: EXECUTED_OPTIMISTIC
              testnet:
                summary: Send transaction (Testnet)
                value:
                  jsonrpc: "2.0"
                  id: fastnear
                  method: send_tx
                  params:
                    signed_tx_base64: ExampleBase64EncodedTransaction
                    wait_until: EXECUTED_OPTIMISTIC
      responses:
        200:
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonRpcResponse"
components:
  schemas:
    JsonRpcResponse:
      type: object
      required: [jsonrpc, id]
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: number
        result:
          type: object
          properties:
            final_execution_status:
              type: string
              enum:
                - NONE
                - INCLUDED
                - INCLUDED_FINAL
                - EXECUTED
                - EXECUTED_OPTIMISTIC
                - FINAL
              description: Desired level of execution status guarantee
            receipts:
              type: array
              items:
                type: object
              description: Receipts generated from the transaction
            receipts_outcome:
              type: array
              items:
                type: object
              description: The execution outcome of receipts.
            status:
              type: object
              description: One of multiple possible types
            transaction:
              type: object
              description: Signed Transaction
            transaction_outcome:
              type: object
              description: The execution outcome of the signed transaction.
          required: [final_execution_status]
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
            data:
              type: object
