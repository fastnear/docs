extends:
  - recommended
rules:
  security-defined: 'off'
  operation-4xx-response: 'off'
  info-license: 'off'
openapi:
  showExtensions: true
  hideReplay: false
  hideSchemaTitles: true
  hideInfoMetadata: false
  hidePropertiesPrefix: false
  sortRequiredPropsFirst: true
  codeSamples:
    skipOptionalParameters: false
    languages:
      - lang: curl
        label: curl
markdown:
  lastUpdatedBlock:
    format: long
    locale: en-US
    hide: true
sidebar:
  hide: true
navbar:
  hide: true
feedback:
  hide: true
search:
  hide: false
colorMode:
  modes:
    - light
    - dark
scripts:
  head:
    - src: ./scripts/dark-mode.js
apis:
  api:
    root: apis/openapi.yaml
    openapi:
      hideDownloadButtons: true
      expandDefaultServerVariables: true
      expandResponses: all
  rpc:
    root: rpcs/openapi.yaml
    openapi:
      hideDownloadButtons: true
      expandDefaultServerVariables: true
      layout: stacked
      schemaExpansionLevel: 0
      showConsole: true
      hideSidebar: true
mockServer:
  position: 'off'
codeSnippet:
  report:
    hide: true
breadcrumbs:
  hide: true
navigation:
  previousButton:
    hide: true
  nextButton:
    hide: true
